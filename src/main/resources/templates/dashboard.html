<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard | Shooting Star</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

<nav class="main-nav">
	<div class="nav-container">
		<a th:href="@{/shootingstar/}" class="nav-logo">Shooting Star</a>

		<form method="post" th:action="@{/auth/logout}" class="logout-form">
			<button type="submit" class="nav-tape logout-btn">Log Out</button>
		</form>
	</div>
</nav>

<header class="user-hero">
	<h1>Welcome, <span th:text="${session.username}">User</span></h1>
	<p class="subtitle">Your collection of stars is waiting.</p>
</header>

<div class="notebook-page expanded-card">
	<div class="card-header">
		<h3>Your Constellations</h3>
		<a th:href="@{/wishlists/new}" class="main-button">+ Create New</a>
	</div>

	<ul class="wishlist-list">
		<li th:if="${#lists.isEmpty(wishlists)}" class="empty-state">
			No wishlists yet. <span><a th:href="@{/wishlists/new}" class="blue-pen">Start your first one here.</a></span>
		</li>

		<li th:each="wl : ${wishlists}" class="wishlist-item">
			<div class="item-main">
				<a th:href="@{/wishlists/{id}(id=${wl.wishlistId})}"
				   th:text="${wl.title}" class="wishlist-title">Wishlist Title</a>
			</div>

			<div class="item-actions">
				<a th:href="@{/wishlists/{id}/edit(id=${wl.wishlistId})}" class="blue-pen">Rename</a>

				<form th:action="@{/wishlists/{id}/delete(id=${wl.wishlistId})}" method="post" class="inline-form">
					<button type="submit" class="delete-btn"
					        th:data-name="${wl.title}"
					        onclick="return confirm('Really wanna delete ' + this.getAttribute('data-name') + '?')">
						Delete
					</button>
				</form>
			</div>
		</li>
	</ul>
</div>

</body>
</html>
