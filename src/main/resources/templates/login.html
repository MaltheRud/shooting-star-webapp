<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Login</title>
</head>

<body>

<h2>Login</h2>

<form th:method="post" th:action="@{/auth/login}">

	<p th:if="${wronglogin}" th:text="${wronglogin}" style="color:red;"></p>

	<label>Username</label><br>
	<input type="text" name="username" required>
	<br><br>

	<label>Password</label><br>
	<input type="password" name="password" required>
	<br><br>

	<button type="submit">Login</button>

</form>

<hr>

<p>Don’t have an account?</p>
<a th:href="@{/shootingstar/signup}">Create one</a>

</body>
</html>
