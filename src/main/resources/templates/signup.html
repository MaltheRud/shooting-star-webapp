<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up | Shooting Star</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/signup.css}">
</head>
<body>

<nav class="sketch-nav">
	<a th:href="@{/shootingstar/home}" class="nav-tape">Home</a>
</nav>

<div class="notebook-page">
	<header>
		<h1>Create Account</h1>
		<p class="subtitle">Join the constellation.</p>
	</header>

	<main class="action-area">
		<form th:method="post" th:action="@{/shootingstar/users/create}" th:object="${user}" class="auth-form">

			<div class="input-group">
				<label>Name</label>
				<input type="text" th:field="*{name}" placeholder="your full name..." required>
			</div>

			<div class="input-group">
				<label>Username</label>
				<input type="text" th:field="*{username}" placeholder="choose a handle..." required>
			</div>

			<div class="input-group">
				<label>Password</label>
				<input type="password" th:field="*{password}" placeholder="••••••••" required>
			</div>

			<div class="input-group">
				<label>Email</label>
				<input type="email" th:field="*{email}" placeholder="your@email.com" required>
			</div>

			<button type="submit" class="main-button" style="width: 100%; margin-top: 10px;">Complete</button>
		</form>

		<p style="margin-top: 25px; font-size: 0.9rem;">
			Already have an account?
			<a th:href="@{/shootingstar/login}" style="color: #1a73e8; text-decoration: none; font-weight: 500;">Go to Login</a>
		</p>
	</main>
</div>

</body>
</html>
